<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torre de Hanói - Demonstração</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #0056b3;
            --base-color: #555;
            --pin-color: #8b4513;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { margin-bottom: 10px; }
        
        .controls {
            background: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background-color: #004494; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }

        .game-board {
            display: flex;
            gap: 60px;
            padding-bottom: 10px;
            border-bottom: 15px solid var(--base-color);
            border-radius: 5px;
        }

        .tower {
            width: 160px;
            height: 300px;
            display: flex;
            flex-direction: column-reverse; /* Faz os discos empilharem de baixo para cima */
            align-items: center;
            position: relative;
        }

        /* O pino central */
        .tower::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 100%;
            background-color: var(--pin-color);
            bottom: 0;
            z-index: 0;
            border-radius: 6px 6px 0 0;
        }

        .disk {
            height: 30px;
            border-radius: 15px;
            margin-bottom: 2px;
            z-index: 1;
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .stats {
            margin-top: 30px;
            font-size: 1.5rem;
            background: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .highlight { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Simulador: Torre de Hanói</h1>
    
    <div class="controls">
        <label for="diskCount"><strong>Número de Discos:</strong></label>
        <select id="diskCount">
            <option value="3">3 Discos</option>
            <option value="4">4 Discos</option>
            <option value="5">5 Discos</option>
            <option value="6">6 Discos</option>
            <option value="7">7 Discos</option>
        </select>
        <button id="btnResolver" onclick="iniciarResolucao()">Resolver Automaticamente</button>
        <button id="btnResetar" onclick="resetar()">Reiniciar</button>
    </div>

    <div class="game-board">
        <div class="tower" id="towerA"></div>
        <div class="tower" id="towerB"></div>
        <div class="tower" id="towerC"></div>
    </div>

    <div class="stats">
        Movimentos realizados: <span id="movimentos" class="highlight">0</span> <br>
        Mínimo esperado (Fórmula 2ⁿ - 1): <span id="esperado" class="highlight">7</span>
    </div>

    <script>
        const cores = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5', '#00BBF9'];
        let movesQueue = [];
        let isAnimating = false;
        let moveCount = 0;

        // Função para criar o estado inicial
        function inicializarDiscos() {
            const numDiscos = parseInt(document.getElementById('diskCount').value);
            const towerA = document.getElementById('towerA');
            
            // Limpa as torres
            document.querySelectorAll('.tower').forEach(t => t.innerHTML = '');
            
            // Atualiza estatísticas
            moveCount = 0;
            document.getElementById('movimentos').innerText = moveCount;
            document.getElementById('esperado').innerText = Math.pow(2, numDiscos) - 1;

            // Cria os discos (do maior para o menor para o flex column-reverse cuidar do resto)
            for (let i = numDiscos; i >= 1; i--) {
                const disk = document.createElement('div');
                disk.classList.add('disk');
                // Calcula a largura proporcionalmente
                disk.style.width = `${40 + (i * 16)}px`; 
                disk.style.backgroundColor = cores[i - 1];
                disk.id = `disk-${i}`;
                towerA.appendChild(disk);
            }
        }

        // Lógica recursiva padrão da Torre de Hanói
        function calcularMovimentos(n, origem, destino, auxiliar) {
            if (n === 1) {
                movesQueue.push({ from: origem, to: destino });
                return;
            }
            calcularMovimentos(n - 1, origem, auxiliar, destino);
            movesQueue.push({ from: origem, to: destino });
            calcularMovimentos(n - 1, auxiliar, destino, origem);
        }

        // Função assíncrona para animar os movimentos um por um
        async function processarMovimentos() {
            isAnimating = true;
            document.getElementById('btnResolver').disabled = true;
            document.getElementById('diskCount').disabled = true;

            for (let i = 0; i < movesQueue.length; i++) {
                if (!isAnimating) break; // Permite interrupção pelo botão de reset

                const move = movesQueue[i];
                const sourceTower = document.getElementById(move.from);
                const targetTower = document.getElementById(move.to);
                
                // Pega o disco do topo da torre de origem (último filho no DOM devido ao column-reverse)
                const disk = sourceTower.lastElementChild;
                
                // Adiciona na torre de destino (vai automaticamente para o topo da pilha)
                targetTower.appendChild(disk);
                
                moveCount++;
                document.getElementById('movimentos').innerText = moveCount;

                // Pausa para a animação (800ms)
                await new Promise(resolve => setTimeout(resolve, 800));
            }

            document.getElementById('btnResolver').disabled = false;
            document.getElementById('diskCount').disabled = false;
            isAnimating = false;
        }

        function iniciarResolucao() {
            if (isAnimating) return;
            resetar();
            const numDiscos = parseInt(document.getElementById('diskCount').value);
            movesQueue = [];
            
            // O algoritmo recursivo alimenta a fila de movimentos (movesQueue)
            calcularMovimentos(numDiscos, 'towerA', 'towerC', 'towerB');
            
            // Inicia a execução visual da fila
            processarMovimentos();
        }

        function resetar() {
            isAnimating = false; // Interrompe a animação atual se houver
            inicializarDiscos();
            document.getElementById('btnResolver').disabled = false;
            document.getElementById('diskCount').disabled = false;
        }

        // Event listener para quando o usuário mudar a quantidade de discos
        document.getElementById('diskCount').addEventListener('change', resetar);

        // Inicializa a tela na primeira carga
        window.onload = inicializarDiscos;
    </script>
</body>
</html>

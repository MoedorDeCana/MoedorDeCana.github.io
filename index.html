<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dança do Alumínio - Câmara Selada</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #info { position: absolute; top: 15px; text-align: center; z-index: 10; background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 8px; }
        canvas { box-shadow: 0 4px 15px rgba(0,0,0,0.2); background: white; border-radius: 8px; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div id="info">
        <h2>A Dança do Alumínio</h2>
        <p>Arraste o cano de PVC para perto do copo de vidro.</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        const width = 800;
        const height = 500;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width, height, wireframes: false, background: '#fff' }
        });

        // 1. LIMITES INVISÍVEIS DA TELA (Para o cano não sumir)
        const wTop = Bodies.rectangle(width/2, -50, width+100, 100, { isStatic: true });
        const wBot = Bodies.rectangle(width/2, height+50, width+100, 100, { isStatic: true });
        const wLeft = Bodies.rectangle(-50, height/2, 100, height+100, { isStatic: true });
        const wRight = Bodies.rectangle(width+50, height/2, 100, height+100, { isStatic: true });

        // 2. A MESA E O COPO (Paredes super grossas para evitar o "tunneling")
        const mesa = Bodies.rectangle(width/2, 450, width, 100, { isStatic: true, render: { fillStyle: '#bdc3c7' } });
        
        const wallThickness = 80; // Espessura massiva para segurança física
        const cupWidth = 200;
        const cupHeight = 160;
        const cx = width / 2;
        const cy = 400 - cupHeight / 2;

        // O vidro do copo (visualizado de forma semi-transparente)
        const renderCopo = { fillStyle: 'rgba(149, 165, 166, 0.4)', strokeStyle: '#7f8c8d', lineWidth: 2 };
        
        const paredeEsq = Bodies.rectangle(cx - cupWidth/2 - wallThickness/2, cy, wallThickness, cupHeight, { isStatic: true, render: renderCopo });
        const paredeDir = Bodies.rectangle(cx + cupWidth/2 + wallThickness/2, cy, wallThickness, cupHeight, { isStatic: true, render: renderCopo });
        const teto = Bodies.rectangle(cx, cy - cupHeight/2 - wallThickness/2, cupWidth + wallThickness*2, wallThickness, { isStatic: true, render: renderCopo });

        // Fundindo as 3 peças em uma só:
        const copoUnico = Body.create({
            parts: [paredeEsq, paredeDir, teto],
            isStatic: true
        });

        // 3. BITS DE ALUMÍNIO (As bolinhas de papel)
        const bits = [];
        for (let i = 0; i < 80; i++) {
            const bit = Bodies.rectangle(cx - cupWidth/3 + Math.random()*(cupWidth*0.6), 380 - Math.random()*20, 8, 8, {
                restitution: 0.8, // Quão "elástico" é o pulo
                friction: 0.05,
                density: 0.001,
                render: { fillStyle: '#95a5a6' }
            });
            bits.push(bit);
        }

        // 4. CANO DE PVC (Arrastável, sem gravidade)
        const cano = Bodies.rectangle(150, 200, 160, 30, {
            render: { fillStyle: '#e67e22', strokeStyle: '#d35400', lineWidth: 3 }
        });
        
        // Mantém o cano flutuando (cancela a gravidade apenas para ele)
        Events.on(engine, 'beforeUpdate', () => {
            cano.force.y = -engine.world.gravity.y * engine.world.gravity.scale * cano.mass;
        });

        Composite.add(world, [wTop, wBot, wLeft, wRight, mesa, copoUnico, cano, ...bits]);

        // 5. MOUSE (Para arrastar o cano)
        const mouse = Mouse.create(render.canvas);
        const mConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        Composite.add(world, mConstraint);
        render.mouse = mouse;

        // 6. FÍSICA DE REPULSÃO E PROTEÇÃO ANTI-VAZAMENTO
        const MAX_SPEED = 18; // O "freio" de segurança

        Events.on(engine, 'afterUpdate', () => {
            const canoPos = cano.position;
            const dist = Math.hypot(canoPos.x - cx, canoPos.y - cy);

            // Calcula a força baseada na distância do cano
            let power = 0;
            if (dist < 300) {
                power = (300 - dist) * 0.00009; 
            }

            bits.forEach(bit => {
                // Efeito elétrico: Quando o cano aproxima, aplica força
                if (power > 0) {
                    // Força joga os pedacinhos para cima e pros lados
                    const fx = (Math.random() - 0.5) * power;
                    const fy = -Math.random() * power * 1.5;
                    Body.applyForce(bit, bit.position, { x: fx, y: fy });
                    
                    // Ficam azuis para indicar que estão polarizados/carregados
                    bit.render.fillStyle = '#3498db'; 
                } else {
                    // Voltam à cor normal quando o cano se afasta
                    bit.render.fillStyle = '#95a5a6'; 
                }

                // SISTEMA ANTI-TUNNELING (Impede de atravessar o vidro)
                const speed = Math.hypot(bit.velocity.x, bit.velocity.y);
                if (speed > MAX_SPEED) {
                    const scale = MAX_SPEED / speed;
                    Body.setVelocity(bit, { x: bit.velocity.x * scale, y: bit.velocity.y * scale });
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
